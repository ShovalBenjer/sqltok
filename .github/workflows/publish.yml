name: Publish to PyPI

# Publishing uses PyPI Trusted Publishing (OIDC), so no API token is stored in
# the repository. One-time setup on PyPI is required before the first run:
#
#   1. Create the project owner/account on https://pypi.org
#   2. Add a "pending" trusted publisher under the project's Publishing settings:
#        Owner:        ShovalBenjer
#        Repository:   sqltok
#        Workflow:     publish.yml
#   3. Then run this workflow manually (Actions tab -> Publish to PyPI -> Run),
#      or it runs automatically when a GitHub Release is published.

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
          python -m twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
