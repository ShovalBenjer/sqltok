<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 420" font-family="Inter, 'Segoe UI', system-ui, sans-serif">
  <rect width="940" height="420" fill="#0d1424"/>
  <text x="470" y="32" fill="#e8eef7" font-size="19" font-weight="700" text-anchor="middle">Submodular coverage: most new mentions covered per token</text>
  <text x="470" y="56" fill="#9fb0c8" font-size="13" text-anchor="middle">f(S) = sum over mentions of weight times the best cover by any selected table</text>

  <!-- coverage grid -->
  <text x="60" y="92" fill="#9fb0c8" font-size="12.5" font-weight="600">cover[table, mention]</text>
  <!-- mention headers -->
  <text x="250" y="92" fill="#6fb1ff" font-size="12" text-anchor="middle">amount</text>
  <text x="330" y="92" fill="#6fb1ff" font-size="12" text-anchor="middle">France</text>
  <text x="410" y="92" fill="#6fb1ff" font-size="12" text-anchor="middle">category</text>

  <!-- rows -->
  <g font-size="12.5">
    <!-- orders -->
    <text x="60" y="126" fill="#cfe0f5">orders</text>
    <rect x="216" y="108" width="68" height="26" rx="4" fill="#2f6fbf"/><text x="250" y="126" fill="#eaf2ff" text-anchor="middle">0.9</text>
    <rect x="296" y="108" width="68" height="26" rx="4" fill="#1a2740"/><text x="330" y="126" fill="#6b7d99" text-anchor="middle">0.0</text>
    <rect x="376" y="108" width="68" height="26" rx="4" fill="#1a2740"/><text x="410" y="126" fill="#6b7d99" text-anchor="middle">0.0</text>
    <!-- customers -->
    <text x="60" y="162" fill="#cfe0f5">customers</text>
    <rect x="216" y="144" width="68" height="26" rx="4" fill="#1a2740"/><text x="250" y="162" fill="#6b7d99" text-anchor="middle">0.0</text>
    <rect x="296" y="144" width="68" height="26" rx="4" fill="#2f6fbf"/><text x="330" y="162" fill="#eaf2ff" text-anchor="middle">0.8</text>
    <rect x="376" y="144" width="68" height="26" rx="4" fill="#1a2740"/><text x="410" y="162" fill="#6b7d99" text-anchor="middle">0.0</text>
    <!-- orders_archive (redundant) -->
    <text x="60" y="198" fill="#cfe0f5">orders_archive</text>
    <rect x="216" y="180" width="68" height="26" rx="4" fill="#2f6fbf"/><text x="250" y="198" fill="#eaf2ff" text-anchor="middle">0.9</text>
    <rect x="296" y="180" width="68" height="26" rx="4" fill="#1a2740"/><text x="330" y="198" fill="#6b7d99" text-anchor="middle">0.0</text>
    <rect x="376" y="180" width="68" height="26" rx="4" fill="#1a2740"/><text x="410" y="198" fill="#6b7d99" text-anchor="middle">0.0</text>
    <!-- products -->
    <text x="60" y="234" fill="#cfe0f5">products</text>
    <rect x="216" y="216" width="68" height="26" rx="4" fill="#1a2740"/><text x="250" y="234" fill="#6b7d99" text-anchor="middle">0.0</text>
    <rect x="296" y="216" width="68" height="26" rx="4" fill="#1a2740"/><text x="330" y="234" fill="#6b7d99" text-anchor="middle">0.0</text>
    <rect x="376" y="216" width="68" height="26" rx="4" fill="#2f6fbf"/><text x="410" y="234" fill="#eaf2ff" text-anchor="middle">0.7</text>
  </g>

  <!-- greedy steps -->
  <rect x="500" y="92" width="408" height="252" rx="10" fill="#111d34" stroke="#2a3a5c"/>
  <text x="520" y="116" fill="#9fb0c8" font-size="12.5" font-weight="600">greedy by marginal gain / token cost</text>

  <circle cx="528" cy="146" r="6" fill="#57c98a"/>
  <text x="546" y="150" fill="#cfe0f5" font-size="12.5">pick orders. covers amount. gain up.</text>

  <circle cx="528" cy="178" r="6" fill="#57c98a"/>
  <text x="546" y="182" fill="#cfe0f5" font-size="12.5">pick customers. covers France. gain up.</text>

  <circle cx="528" cy="210" r="6" fill="#e0795a"/>
  <text x="546" y="214" fill="#cfe0f5" font-size="12.5">orders_archive covers amount again.</text>
  <text x="546" y="232" fill="#e0a85a" font-size="12.5">marginal gain = 0. skipped. (no redundancy)</text>

  <circle cx="528" cy="264" r="6" fill="#57c98a"/>
  <text x="546" y="268" fill="#cfe0f5" font-size="12.5">pick products. covers category. gain up.</text>

  <line x1="516" y1="290" x2="892" y2="290" stroke="#2a3a5c"/>
  <text x="520" y="314" fill="#7ee0a8" font-size="12.5" font-weight="600">selected: orders, customers, products</text>
  <text x="520" y="332" fill="#7f93b0" font-size="11.5">stop when budget is hit or no new mention remains</text>

  <text x="470" y="378" fill="#9fb0c8" font-size="12.5" text-anchor="middle">The max in f makes a covered mention worth 0 to a second table, so diminishing returns remove redundancy.</text>
  <text x="470" y="398" fill="#7f93b0" font-size="11.5" text-anchor="middle">Monotone and submodular, so the greedy maximizer has the (1 - 1/e) approximation guarantee.</text>
</svg>
