<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 300" font-family="Inter, 'Segoe UI', system-ui, sans-serif">
  <rect width="940" height="300" fill="#0d1424"/>
  <text x="470" y="34" fill="#e8eef7" font-size="20" font-weight="700" text-anchor="middle">SQLTok pipeline: from question to budgeted, joinable schema</text>

  <!-- inputs -->
  <g>
    <rect x="24" y="70" width="150" height="160" rx="10" fill="#16203a" stroke="#2a3a5c"/>
    <text x="99" y="96" fill="#9fb0c8" font-size="13" text-anchor="middle" font-weight="600">INPUTS</text>
    <rect x="40" y="110" width="118" height="30" rx="6" fill="#1d2b4a"/>
    <text x="99" y="130" fill="#cfe0f5" font-size="13" text-anchor="middle">question</text>
    <rect x="40" y="148" width="118" height="30" rx="6" fill="#1d2b4a"/>
    <text x="99" y="168" fill="#cfe0f5" font-size="13" text-anchor="middle">schema</text>
    <rect x="40" y="186" width="118" height="30" rx="6" fill="#1d2b4a"/>
    <text x="99" y="206" fill="#cfe0f5" font-size="13" text-anchor="middle">token budget</text>
  </g>

  <!-- stage boxes -->
  <g>
    <rect x="214" y="78" width="160" height="144" rx="10" fill="#13233f" stroke="#4a90d9"/>
    <text x="294" y="104" fill="#6fb1ff" font-size="13" font-weight="700" text-anchor="middle">1. GROUNDING</text>
    <text x="294" y="130" fill="#cfe0f5" font-size="12.5" text-anchor="middle">mentions to</text>
    <text x="294" y="148" fill="#cfe0f5" font-size="12.5" text-anchor="middle">tables, columns,</text>
    <text x="294" y="166" fill="#cfe0f5" font-size="12.5" text-anchor="middle">and cell values</text>
    <text x="294" y="196" fill="#7f93b0" font-size="11" text-anchor="middle">MinHash + LSH</text>
  </g>

  <g>
    <rect x="404" y="78" width="160" height="144" rx="10" fill="#13233f" stroke="#4a90d9"/>
    <text x="484" y="104" fill="#6fb1ff" font-size="13" font-weight="700" text-anchor="middle">2. COVERAGE</text>
    <text x="484" y="130" fill="#cfe0f5" font-size="12.5" text-anchor="middle">submodular pick</text>
    <text x="484" y="148" fill="#cfe0f5" font-size="12.5" text-anchor="middle">under the budget</text>
    <text x="484" y="166" fill="#cfe0f5" font-size="12.5" text-anchor="middle">(CELF greedy)</text>
    <text x="484" y="196" fill="#7f93b0" font-size="11" text-anchor="middle">(1 - 1/e) bound</text>
  </g>

  <g>
    <rect x="594" y="78" width="160" height="144" rx="10" fill="#13233f" stroke="#4a90d9"/>
    <text x="674" y="104" fill="#6fb1ff" font-size="13" font-weight="700" text-anchor="middle">3. FK STEINER</text>
    <text x="674" y="130" fill="#cfe0f5" font-size="12.5" text-anchor="middle">add bridge tables</text>
    <text x="674" y="148" fill="#cfe0f5" font-size="12.5" text-anchor="middle">so the schema is</text>
    <text x="674" y="166" fill="#cfe0f5" font-size="12.5" text-anchor="middle">joinable</text>
    <text x="674" y="196" fill="#7f93b0" font-size="11" text-anchor="middle">shortest FK path</text>
  </g>

  <!-- output -->
  <g>
    <rect x="784" y="78" width="132" height="144" rx="10" fill="#16203a" stroke="#57c98a"/>
    <text x="850" y="104" fill="#57c98a" font-size="13" font-weight="700" text-anchor="middle">OUTPUT</text>
    <text x="850" y="132" fill="#cfe0f5" font-size="12.5" text-anchor="middle">SchemaContext</text>
    <text x="850" y="154" fill="#cfe0f5" font-size="12.5" text-anchor="middle">text + tables</text>
    <text x="850" y="176" fill="#cfe0f5" font-size="12.5" text-anchor="middle">token_count</text>
    <text x="850" y="198" fill="#7f93b0" font-size="11" text-anchor="middle">≤ budget, measured</text>
  </g>

  <!-- arrows -->
  <g stroke="#4a90d9" stroke-width="2.5" fill="none" marker-end="url(#ah)">
    <line x1="176" y1="150" x2="210" y2="150"/>
    <line x1="376" y1="150" x2="400" y2="150"/>
    <line x1="566" y1="150" x2="590" y2="150"/>
    <line x1="756" y1="150" x2="780" y2="150"/>
  </g>
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#4a90d9"/>
    </marker>
  </defs>

  <text x="470" y="266" fill="#7f93b0" font-size="12.5" text-anchor="middle">Every tentative add is re-measured with tiktoken, so the final context never exceeds the budget.</text>
</svg>
