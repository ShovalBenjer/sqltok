<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 380" font-family="Inter, 'Segoe UI', system-ui, sans-serif">
  <rect width="940" height="380" fill="#0d1424"/>
  <text x="470" y="32" fill="#e8eef7" font-size="19" font-weight="700" text-anchor="middle">Value grounding: catching a mention that hides in the data</text>
  <text x="470" y="56" fill="#9fb0c8" font-size="13" text-anchor="middle">Question: "total orders for customers in France"</text>

  <!-- step 1 mention -->
  <rect x="30" y="86" width="150" height="56" rx="8" fill="#1d2b4a" stroke="#2a3a5c"/>
  <text x="105" y="110" fill="#9fb0c8" font-size="11" text-anchor="middle">mention</text>
  <text x="105" y="130" fill="#cfe0f5" font-size="15" font-weight="600" text-anchor="middle">"France"</text>

  <!-- step 2 shingles -->
  <rect x="220" y="78" width="180" height="72" rx="8" fill="#13233f" stroke="#4a90d9"/>
  <text x="310" y="100" fill="#6fb1ff" font-size="11" text-anchor="middle">char 3-shingles</text>
  <text x="310" y="124" fill="#cfe0f5" font-size="13" text-anchor="middle">{fra, ran, anc, nce}</text>
  <text x="310" y="142" fill="#7f93b0" font-size="10.5" text-anchor="middle">fuzzy, robust to case/plurals</text>

  <!-- step 3 minhash -->
  <rect x="440" y="78" width="180" height="72" rx="8" fill="#13233f" stroke="#4a90d9"/>
  <text x="530" y="100" fill="#6fb1ff" font-size="11" text-anchor="middle">MinHash signature</text>
  <text x="530" y="124" fill="#cfe0f5" font-size="13" text-anchor="middle">[h1, h2, ... h64]</text>
  <text x="530" y="142" fill="#7f93b0" font-size="10.5" text-anchor="middle">estimates Jaccard similarity</text>

  <!-- step 4 lsh -->
  <rect x="660" y="78" width="250" height="72" rx="8" fill="#13233f" stroke="#4a90d9"/>
  <text x="785" y="100" fill="#6fb1ff" font-size="11" text-anchor="middle">banded LSH lookup</text>
  <text x="785" y="124" fill="#cfe0f5" font-size="13" text-anchor="middle">colliding buckets to candidates</text>
  <text x="785" y="142" fill="#7f93b0" font-size="10.5" text-anchor="middle">near O(1) candidate generation</text>

  <g stroke="#4a90d9" stroke-width="2.2" fill="none" marker-end="url(#ah2)">
    <line x1="182" y1="114" x2="216" y2="114"/>
    <line x1="402" y1="114" x2="436" y2="114"/>
    <line x1="622" y1="114" x2="656" y2="114"/>
  </g>

  <!-- indexed schema elements -->
  <text x="470" y="196" fill="#9fb0c8" font-size="13" text-anchor="middle" font-weight="600">Indexed schema elements (names AND sampled cell values)</text>

  <!-- column name route (miss) -->
  <rect x="120" y="214" width="320" height="120" rx="10" fill="#16203a" stroke="#5c3a3a"/>
  <text x="280" y="238" fill="#e0a85a" font-size="12.5" text-anchor="middle" font-weight="700">column / table NAMES</text>
  <text x="280" y="262" fill="#cfe0f5" font-size="12.5" text-anchor="middle">customers.id, customers.name,</text>
  <text x="280" y="280" fill="#cfe0f5" font-size="12.5" text-anchor="middle">customers.country, orders.amount</text>
  <text x="280" y="312" fill="#e0795a" font-size="12.5" text-anchor="middle" font-weight="600">"France" matches no name  ✗  (BM25 misses)</text>

  <!-- cell value route (hit) -->
  <rect x="500" y="214" width="320" height="120" rx="10" fill="#16203a" stroke="#2f5c43"/>
  <text x="660" y="238" fill="#57c98a" font-size="12.5" text-anchor="middle" font-weight="700">sampled CELL VALUES</text>
  <text x="660" y="262" fill="#cfe0f5" font-size="12.5" text-anchor="middle">customers.country = {France,</text>
  <text x="660" y="280" fill="#cfe0f5" font-size="12.5" text-anchor="middle">Germany, United States, ...}</text>
  <text x="660" y="312" fill="#7ee0a8" font-size="12.5" text-anchor="middle" font-weight="600">"France" grounds to customers  ✓</text>

  <g stroke="#4a90d9" stroke-width="2.2" fill="none" marker-end="url(#ah2)">
    <line x1="785" y1="152" x2="700" y2="210"/>
    <line x1="785" y1="152" x2="320" y2="210"/>
  </g>

  <defs>
    <marker id="ah2" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 z" fill="#4a90d9"/>
    </marker>
  </defs>
</svg>
