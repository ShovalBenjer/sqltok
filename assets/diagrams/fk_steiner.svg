<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 940 360" font-family="Inter, 'Segoe UI', system-ui, sans-serif">
  <rect width="940" height="360" fill="#0d1424"/>
  <text x="470" y="32" fill="#e8eef7" font-size="19" font-weight="700" text-anchor="middle">Foreign-key Steiner bridge: make the selection joinable</text>

  <!-- LEFT: relevance only -->
  <text x="235" y="70" fill="#e0a85a" font-size="13" font-weight="700" text-anchor="middle">relevance only</text>
  <text x="235" y="90" fill="#9fb0c8" font-size="11.5" text-anchor="middle">products and orders selected, but no join path</text>

  <!-- products node -->
  <rect x="70" y="120" width="120" height="44" rx="8" fill="#13233f" stroke="#57c98a" stroke-width="2"/>
  <text x="130" y="147" fill="#cfe0f5" font-size="13" text-anchor="middle">products</text>
  <!-- orders node -->
  <rect x="290" y="120" width="120" height="44" rx="8" fill="#13233f" stroke="#57c98a" stroke-width="2"/>
  <text x="350" y="147" fill="#cfe0f5" font-size="13" text-anchor="middle">orders</text>
  <!-- line_items faint -->
  <rect x="180" y="220" width="120" height="44" rx="8" fill="#141b2c" stroke="#33405e" stroke-dasharray="5 4"/>
  <text x="240" y="247" fill="#5d6f8c" font-size="13" text-anchor="middle">line_items</text>
  <!-- faint edges -->
  <line x1="180" y1="200" x2="200" y2="218" stroke="#33405e" stroke-dasharray="4 4"/>
  <line x1="300" y1="200" x2="280" y2="218" stroke="#33405e" stroke-dasharray="4 4"/>
  <text x="235" y="300" fill="#e0795a" font-size="12.5" text-anchor="middle" font-weight="600">gap: the model would invent a join  ✗</text>

  <!-- divider -->
  <line x1="470" y1="60" x2="470" y2="320" stroke="#1e2c48"/>

  <!-- RIGHT: after steiner -->
  <text x="705" y="70" fill="#57c98a" font-size="13" font-weight="700" text-anchor="middle">after FK-Steiner</text>
  <text x="705" y="90" fill="#9fb0c8" font-size="11.5" text-anchor="middle">shortest FK path adds the bridge table</text>

  <rect x="540" y="120" width="120" height="44" rx="8" fill="#13233f" stroke="#57c98a" stroke-width="2"/>
  <text x="600" y="147" fill="#cfe0f5" font-size="13" text-anchor="middle">products</text>
  <rect x="760" y="120" width="120" height="44" rx="8" fill="#13233f" stroke="#57c98a" stroke-width="2"/>
  <text x="820" y="147" fill="#cfe0f5" font-size="13" text-anchor="middle">orders</text>
  <rect x="650" y="220" width="120" height="44" rx="8" fill="#16203a" stroke="#6fb1ff" stroke-width="2.5"/>
  <text x="710" y="241" fill="#cfe0f5" font-size="13" text-anchor="middle">line_items</text>
  <text x="710" y="257" fill="#6fb1ff" font-size="10" text-anchor="middle">bridge</text>

  <line x1="650" y1="200" x2="675" y2="218" stroke="#6fb1ff" stroke-width="2.5"/>
  <line x1="770" y1="200" x2="745" y2="218" stroke="#6fb1ff" stroke-width="2.5"/>
  <text x="600" y="190" fill="#7f93b0" font-size="10.5" text-anchor="middle">FK</text>
  <text x="820" y="190" fill="#7f93b0" font-size="10.5" text-anchor="middle">FK</text>

  <text x="705" y="300" fill="#7ee0a8" font-size="12.5" text-anchor="middle" font-weight="600">products to line_items to orders is joinable  ✓</text>

  <text x="470" y="342" fill="#7f93b0" font-size="11.5" text-anchor="middle">Bridge tables are added only if they fit the remaining token budget.</text>
</svg>
